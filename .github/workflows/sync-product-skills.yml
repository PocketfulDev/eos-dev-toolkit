name: Sync product skills

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync generated product skills from S3
        run: npm run sync
      - name: Open PR if product skills changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync generated product skills"
          title: "chore: sync generated product skills"
          body: |
            Automated sync of per-product SKILL.md files from the eOS docs pipeline (S3).
            Generated content — review the diff, do not hand-edit `plugins/*/skills/products/**`.
          branch: chore/sync-product-skills
          delete-branch: true
          add-paths: |
            plugins/eos-bank/skills/products/**
            plugins/eos-baas/skills/products/**
