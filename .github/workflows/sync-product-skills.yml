name: Sync product skills

# Prerequisite: the "Open PR if product skills changed" step below uses
# peter-evans/create-pull-request, which needs the repo/org setting
# Settings -> Actions -> General -> "Allow GitHub Actions to create and
# approve pull requests" turned ON. If it's off, PR creation 403s and the
# sync still runs but no PR is opened.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  # Fired by esh_documentation_assets' build-and-deploy workflow after a
  # successful deploy, so the sync runs on every deploy instead of waiting
  # for the daily cron.
  repository_dispatch:
    types: [skills-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
      - name: Sync generated product skills from S3
        run: npm run sync
      - name: Open PR if product skills changed
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c  # v6
        with:
          commit-message: "chore: sync generated product skills"
          title: "chore: sync generated product skills"
          body: |
            Automated sync of per-product SKILL.md files from the eOS docs pipeline (S3).
            Generated content — review the diff, do not hand-edit `plugins/*/skills/products/**`.
          branch: chore/sync-product-skills
          delete-branch: true
          add-paths: |
            plugins/eos-bank/skills/products/**
            plugins/eos-baas/skills/products/**
